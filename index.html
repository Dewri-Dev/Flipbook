<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbook PDF Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- Page Flip Library -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Main Viewer Area -->
        <main class="viewer-main">
            <!-- Top Toolbar -->
            <header class="toolbar">
                <div class="toolbar-left">
                    <button id="toggle-sidebar" class="icon-btn" title="Open / Close Pages">
                        <i data-lucide="panel-left"></i>
                    </button>
                    <span class="file-name">Micro_Project Final Draft.pdf</span>
                </div>

                <div class="toolbar-center">
                    <button id="first-page" class="icon-btn" title="First Page"><i data-lucide="chevrons-left"></i></button>
                    <button id="prev-page" class="icon-btn" title="Previous Page"><i data-lucide="chevron-left"></i></button>
                    
                    <div class="jump-container">
                        <input type="number" id="jump-input" min="1" placeholder="Page">
                        <button id="jump-btn" class="icon-btn" title="Jump to Page"><i data-lucide="arrow-right"></i></button>
                    </div>

                    <span class="page-info">
                        <span id="current-page">1</span> / <span id="total-pages">0</span>
                    </span>
                    
                    <button id="next-page" class="icon-btn" title="Next Page"><i data-lucide="chevron-right"></i></button>
                    <button id="last-page" class="icon-btn" title="Last Page"><i data-lucide="chevrons-right"></i></button>
                </div>

                <div class="toolbar-right">
                    <div class="search-container" id="search-container">
                        <input type="text" id="search-input-field" placeholder="Search pages...">
                        <button id="search-btn" class="icon-btn" title="Search"><i data-lucide="search"></i></button>
                    </div>
                    <button id="toggle-autoflip" class="icon-btn" title="Auto-flip (Slideshow)">
                        <i data-lucide="play"></i>
                    </button>
                    <button id="toggle-sound" class="icon-btn" title="Toggle Sound">
                        <i data-lucide="volume-2"></i>
                    </button>
                    <button id="zoom-out" class="icon-btn" title="Zoom Out"><i data-lucide="zoom-out"></i></button>
                    <span id="zoom-level">100%</span>
                    <button id="zoom-in" class="icon-btn" title="Zoom In"><i data-lucide="zoom-in"></i></button>
                    <button id="toggle-fullscreen" class="icon-btn" title="Fullscreen"><i data-lucide="maximize"></i></button>
                </div>
            </header>

            <!-- Flipbook Container -->
            <div class="flipbook-wrapper" id="flipbook-wrapper">
                <div id="flipbook" class="flipbook">
                    <!-- Pages will be injected here -->
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="progress-bar-container">
                <div id="slider-preview" class="slider-preview">
                    <canvas id="preview-canvas"></canvas>
                    <span id="preview-page-num">1</span>
                </div>
                <input type="range" id="page-slider" min="1" max="100" value="1">
            </div>

            <!-- Bottom Thumbnail Tray (Slidebar) -->
            <div id="bottom-thumbnail-tray" class="bottom-thumbnail-tray">
                <div id="bottom-thumbnail-container" class="bottom-thumbnail-container">
                    <!-- Thumbnails injected here -->
                </div>
            </div>

            <!-- Loading Overlay -->
            <div id="loading-overlay" class="loading-overlay">
                <div class="spinner"></div>
                <p style="letter-spacing: 0.1em; font-size: 0.8rem; font-weight: 600; color: var(--accent-color); text-transform: uppercase;">Preparing Experience</p>
                <span id="loading-progress">0%</span>
            </div>
        </main>

        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <!-- Right Pages Sidebar -->
        <aside class="sidebar-right" id="sidebar-right">
            <div class="sidebar-header">
                <h3>Pages</h3>
                <button id="close-sidebar" class="icon-btn mobile-only"><i data-lucide="x"></i></button>
            </div>
            
            <button id="scroll-up" class="sidebar-scroll-btn" title="Scroll Up">
                <i data-lucide="chevron-up"></i>
            </button>

            <div id="thumbnail-container" class="thumbnail-container">
                <!-- Pages will be injected here -->
            </div>

            <button id="scroll-down" class="sidebar-scroll-btn" title="Scroll Down">
                <i data-lucide="chevron-down"></i>
            </button>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
